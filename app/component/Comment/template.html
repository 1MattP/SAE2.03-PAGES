<div class="comments font-sans">
    <h3 class="comment__title">Commentaires</h3>
    <div class = "comment__form" id="comment-form">
        <textarea class="comment__input" id="comment-input" placeholder="Laisser un commentaire..."></textarea>
        <button class="comment__input-button" onclick="C.handlerAddComment({id})">Envoyer</button>
    </div>
    <div class="comment__list" id="comment-list">{{ comments }}</div>
</div>
