<!DOCTYPE html>
<html lang="fr">

<head>
  <title>SAE2.03 ADMIN</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./css/base.css" />
</head>

<body>
  <section id="log"></section>
  <section id="MovieForm"></section>
  <section id="ProfileForm"></section>
  <section id="FeaturedForm"></section>

  <script type="module">
    import { Log } from "./component/Log/script.js";
    import { MovieForm } from "./component/MovieForm/script.js";
    import { ProfileForm } from "./component/ProfileForm/script.js";
    import { FeaturedForm } from "./component/FeaturedForm/script.js";
    import { DataProfile } from "./data/dataProfile.js"
    import { DataMovie } from "./data/dataMovie.js"

    window.C = {};

    C.handlerAddMovie = async function () {

      let form = document.querySelector('.addMovie__form');
      if (!form.reportValidity()) {
        return;
      }
      let fd = new FormData(form);
      let res = await DataMovie.add(fd);
      V.renderLog(res);

    };
    C.handlerAddProfile = async function () {
      let form = document.querySelector('.addProfile__form');
      if (!form.reportValidity()) {
        return;
      }
      let fd = new FormData(form);

      let res = await DataProfile.add(fd);
      V.renderLog(res);

    }

    C.getCategory = async function (category) {
      let data = await DataMovie.requestCategory();
      V.renderMovieForm(data);
    }


    C.start = function () {
      V.renderLog("Démarrage de l'application");
      C.getCategory();
      C.getProfile();
      V.renderFeaturedForm([]);

    };

    C.getProfile = async function (update) {
      let data = await DataProfile.read();
      C.profiles = data;
      V.renderProfileForm(data);
    };

    C.handlerSelectProfile = function (id) {

      let form = document.querySelector('.addProfile__form');

      if (id == 0) {

        form.querySelector('[name="name"]').value = '';
        form.querySelector('[name="avatar"]').value = '';
        form.querySelector('[name="min_age"]').value = '';
        return;
      }
      let profile = C.profiles.find(p => p.id == id);
      if (!profile) return;

      form.querySelector('[name="name"]').value = profile.name;
      form.querySelector('[name="avatar"]').value = profile.avatar ?? '';
      form.querySelector('[name="min_age"]').value = profile.min_age;
    };

    C.handlerSearchFeatured = async function () {
      let input = document.querySelector("#search-input");
      let keyword = input.value;

      if (keyword === '') return;
      let results = await DataMovie.requestSearch(keyword);

      C.currentSearchResults = results;
      V.renderFeaturedForm(results);
    };
    C.handlerFeatured = async function (id) {

      let movie = C.currentSearchResults.find(m => m.id == id);
      if (!movie) return;

      let newFeaturedStatus;

      if (movie.featured == 1) {
        newFeaturedStatus = 0;
      } else {
        newFeaturedStatus = 1;
      }

      let res = await DataMovie.UpdateFeatured(id, newFeaturedStatus);
      V.renderLog(res);
      movie.featured = newFeaturedStatus;
      V.renderFeaturedForm(C.currentSearchResults);
    };


    window.V = {};

    V.renderLog = function (txt) {
      let content = document.querySelector("#log");
      content.innerHTML = Log.format(txt);
    };

    V.renderMovieForm = function (data) {
      let content = document.querySelector("#MovieForm");
      content.innerHTML = MovieForm.formatMany(data);
    };
    V.renderProfileForm = function (data) {
      let content = document.querySelector("#ProfileForm");
      content.innerHTML = ProfileForm.formatMany(data);
    };
    V.renderFeaturedForm = function (data) {
      let content = document.querySelector("#FeaturedForm");
      content.innerHTML = FeaturedForm.formatMany(data);
    }





    C.start();
  </script>
</body>

</html>
