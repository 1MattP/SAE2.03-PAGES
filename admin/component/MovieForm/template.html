<div class="addMovie">
    <h2 class="addMovie__title"># Ajouter ou modifier un film</h4>
        <form class="addMovie__form">

            <input required type="text" name="name" placeholder="Titre" required>
            <input required type="text" name="director" placeholder="Réalisateur" required>
            <input required type="number" name="year" placeholder="année de sortie" required>
            <input required type="number" name="length" placeholder="Durée(minutes)" required>
            <input required type="text" name="description" placeholder="Description" required>
            <input required type="text" name="image" placeholder="Image" required>

            <select name="id_category" required>
                <option value="1">Action</option>
                <option value="2">Comédie</option>
                <option value="3">Drame</option>
                <option value="4">Science-fiction</option>
                <option value="5">Animation</option>
                <option value="6">Thriller</option>
                <option value="7">Horreur</option>
                <option value="8">Aventure</option>
                <option value="9">Fantaisie</option>
                <option value="10">Documentaire</option>
            </select>
           

            <input required type="url" name="trailer" placeholder="Trailer(url)" required>
            <input required type="number" name="min_age" placeholder="Age Requis"  min="0" max="120" required>

            <input onclick="{{handler}}" type="submit" value="Update" name="todo">
        </form>
</div>.
