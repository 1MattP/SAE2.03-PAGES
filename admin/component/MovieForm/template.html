<div class="addMovie">
    <h4 class="addMovie__title"># Ajouter un film</h4>
        <form class="addMovie__form">

            <input class="addMovie__info" required type="text" name="name" placeholder="Titre">
            <input class="addMovie__info" required type="text" name="director" placeholder="Réalisateur">
            <input class="addMovie__info" required type="number" name="year" placeholder="année de sortie">
            <input class="addMovie__info" required type="number" name="length" placeholder="Durée(minutes)">
            <input class="addMovie__info" required type="text" name="description" placeholder="Description">
            <input class="addMovie__info" required type="text" name="image" placeholder="Image">

            <select class="addMovie__info" name="id_category" required>
                        {{option}}
            </select>
           

            <input class="addMovie__info" required type="url" name="trailer" placeholder="Trailer(url)">
            <input class="addMovie__info" required type="number" name="min_age" placeholder="Age Requis"  min="0" max="120">

            <input class="addMovie__button" onclick="{{handler}}" type="button" value="Update" name="todo">
        </form>
</div>.
