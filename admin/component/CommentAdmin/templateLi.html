<div class="moderation__item">
    <p class="moderation__movie">{{movie_name}}</p>
    <p class="moderation__author">{{profile_name}}</p>
    <p class="moderation__date">{{date}}</p>
    <p class="moderation__content">{{content}}</p>
    <p class="moderation__status">{{status}}</p>
    <button onclick="C.handlerApproveComment({id})">Approuver</button>
    <button onclick="C.handlerDeleteComment({id})">Supprimer</button>
</div>
